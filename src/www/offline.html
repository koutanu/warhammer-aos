<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<title>オフライン - AoS Match Assistant</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<meta name="theme-color" content="#131c1c">
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #131c1c;
			color: #f0ead6;
			font-family: sans-serif;
			padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
		}

		.offline-card {
			max-width: 440px;
			width: calc(100% - 2rem);
			margin: 1rem;
			padding: 2.5rem 2rem;
			background: #1a2626;
			border: 1px solid #2f4f4f;
			border-radius: 12px;
			text-align: center;
			box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
		}

		.offline-icon {
			font-size: 3rem;
			margin-bottom: 1rem;
		}

		h1 {
			font-size: 1.4rem;
			margin-bottom: 0.75rem;
			letter-spacing: 0.05em;
		}

		p {
			font-size: 0.95rem;
			line-height: 1.6;
			color: rgba(240, 234, 214, 0.8);
			margin-bottom: 1.5rem;
		}

		button {
			background: #d4af37;
			color: #1a1a1a;
			font-weight: bold;
			border: none;
			border-radius: 6px;
			padding: 0.7rem 1.8rem;
			font-size: 1rem;
			cursor: pointer;
		}

		button:active {
			transform: scale(0.98);
		}
	</style>
</head>

<body>
	<div class="offline-card">
		<div class="offline-icon">⚔️</div>
		<h1>オフラインです</h1>
		<p>
			インターネットに接続できませんでした。<br>
			接続状況を確認してから、もう一度お試しください。
		</p>
		<button type="button" onclick="location.reload()">再読み込み</button>
	</div>
</body>

</html>
